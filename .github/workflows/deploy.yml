name: Deploy to GitHub Pages via SSH

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build
        run: |
          mkdir -p build
          cp index.html build/index.html

      - name: Deploy to gh-pages via SSH key
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./build
          publish_branch: gh-pages
          deploy_key: ${{ secrets.GH_PAGES_DEPLOY_KEY }}
          commit_message: "ci: deploy site via actions-gh-pages"